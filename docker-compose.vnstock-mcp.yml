# =============================================================================
# Docker Compose overlay — vnstock MCP server
#
# Usage (add to your existing GoClaw stack):
#   docker compose -f docker-compose.yml \
#     -f docker-compose.managed.yml \
#     -f docker-compose.selfservice.yml \
#     -f docker-compose.vnstock-mcp.yml \
#     up -d --build
# =============================================================================

services:
  vnstock-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnstock-mcp
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=8000
      - MCP_HOST=0.0.0.0
      - LOG_LEVEL=${VNSTOCK_LOG_LEVEL:-INFO}
      - VNSTOCK_API_KEY=${VNSTOCK_API_KEY:-}
    ports:
      - "${VNSTOCK_MCP_PORT:-8000}:8000"
    networks:
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),timeout=5); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
